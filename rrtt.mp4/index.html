<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}

.subtitle{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:20px;
    font-weight:bold;
    text-shadow:0 0 10px #000;
    padding:0 10px;
    z-index:10;
}
</style>

</head>

<body>

<div class="container">

<video id="video" controls autoplay muted playsinline>
    <source src="https://cdn.videy.co/v6Eh3roA1.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>


</div>

<!-- VIDEO END REDIRECT -->
<script>
const video = document.getElementById("video");

video.addEventListener("ended", function () {
    window.location.href = "https://bonnetdetectiveshomecoming.com/svneq81zey?key=2355db89c616ee6bc1073e135bcd8d3f";
});
</script>

<!-- POPUNDER (FIXED SAFE VERSION) -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    let popOpened = false;
    const video = document.getElementById("video");

    function openPopunder() {
        if (!popOpened) {
            window.open("https://t.co/nNul1MegHi", "_blank");
            popOpened = true;
        }
    }

    // first user interaction
    document.addEventListener("click", openPopunder, { once: true });

    // video click trigger
    if (video) {
        video.addEventListener("click", openPopunder, { once: true });
    }

});
</script>

</body>
</html>
